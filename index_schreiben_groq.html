<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schreibtrainer C1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #1a1a18;
        --ink-muted: #6b6b62;
        --ink-faint: #b0afa5;
        --paper: #f7f4ee;
        --paper-warm: #ede9e0;
        --paper-deep: #ddd8cc;
        --accent: #2d5a3d;
        --accent-light: #e8f0eb;
        --accent-muted: #7aab8a;
        --rule: rgba(26, 26, 24, 0.12);
        --red: #8b2a2a;
        --red-light: #f5eaea;
      }
      html {
        font-size: 16px;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        font-weight: 300;
        line-height: 1.75;
        min-height: 100vh;
      }
      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 2rem 6rem;
      }

      /* masthead */
      .masthead {
        text-align: center;
        padding-bottom: 2rem;
        border-bottom: 1.5px solid var(--ink);
        margin-bottom: 2.5rem;
      }
      .masthead-label {
        font-size: 0.7rem;
        font-weight: 400;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 0.5rem;
      }
      .masthead h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 600;
        line-height: 1.1;
      }
      .masthead h1 em {
        font-style: italic;
        color: var(--accent);
      }
      .masthead-sub {
        margin-top: 0.6rem;
        font-size: 0.85rem;
        color: var(--ink-muted);
        letter-spacing: 0.03em;
      }

      /* section label */
      .section-label {
        font-size: 0.68rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-bottom: 0.75rem;
      }

      /* exam buttons */
      .exam-row {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      .exam-btn {
        flex: 1;
        padding: 0.75rem 1rem;
        background: transparent;
        border: 1px solid var(--paper-deep);
        border-radius: 4px;
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
      }
      .exam-btn:hover {
        border-color: var(--accent-muted);
        color: var(--ink);
      }
      .exam-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .exam-btn .exam-sub {
        display: block;
        font-family: "Source Serif 4", serif;
        font-size: 0.72rem;
        font-weight: 300;
        opacity: 0.75;
        margin-top: 0.15rem;
        font-style: italic;
      }

      /* topic */
      .topic-area {
        margin-bottom: 2rem;
      }
      .topic-box {
        background: var(--paper-warm);
        border-left: 3px solid var(--accent);
        padding: 1.2rem 1.4rem;
        border-radius: 0 4px 4px 0;
        font-size: 0.95rem;
        line-height: 1.8;
        min-height: 80px;
        margin-bottom: 0.75rem;
        white-space: pre-wrap;
      }
      .topic-placeholder {
        color: var(--ink-faint);
        font-style: italic;
      }
      .topic-actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }

      /* buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.55rem 1.2rem;
        border-radius: 3px;
        font-family: "Source Serif 4", serif;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid transparent;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-primary:hover {
        background: #234832;
      }
      .btn-primary:disabled {
        background: var(--ink-faint);
        border-color: var(--ink-faint);
        cursor: not-allowed;
      }
      .btn-ghost {
        background: transparent;
        color: var(--ink-muted);
        border-color: var(--paper-deep);
      }
      .btn-ghost:hover {
        border-color: var(--ink-muted);
        color: var(--ink);
      }
      .btn-ghost:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* writing */
      .writing-area {
        margin-bottom: 2rem;
      }
      .writing-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .word-count {
        font-size: 0.78rem;
        color: var(--ink-muted);
      }
      .word-count.warn {
        color: var(--red);
      }
      textarea {
        width: 100%;
        min-height: 240px;
        background: #fff;
        border: 1px solid var(--paper-deep);
        border-radius: 4px;
        padding: 1.1rem 1.2rem;
        font-family: "Source Serif 4", serif;
        font-size: 0.95rem;
        font-weight: 300;
        line-height: 1.85;
        color: var(--ink);
        resize: vertical;
        outline: none;
        transition: border-color 0.15s;
      }
      textarea:focus {
        border-color: var(--accent-muted);
      }
      textarea::placeholder {
        color: var(--ink-faint);
        font-style: italic;
      }
      .submit-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-top: 0.75rem;
      }
      .warn-msg {
        font-size: 0.8rem;
        color: var(--red);
        display: none;
      }
      .warn-msg.visible {
        display: block;
      }

      /* loading */
      .loading {
        display: none;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.82rem;
        color: var(--ink-muted);
        font-style: italic;
        padding: 1rem 0;
      }
      .loading.visible {
        display: flex;
      }
      .dots span {
        animation: blink 1.2s infinite;
        opacity: 0;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
      }

      /* result */
      .result {
        display: none;
        margin-top: 2.5rem;
        border-top: 1.5px solid var(--ink);
        padding-top: 2rem;
      }
      .result.visible {
        display: block;
      }
      .result-title {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .result-section {
        margin-bottom: 1.75rem;
      }
      .result-section-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.75rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--rule);
      }
      .result-section-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        flex-shrink: 0;
      }
      .icon-correction {
        background: var(--accent-light);
        color: var(--accent);
      }
      .icon-good {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .icon-improve {
        background: #fff3e0;
        color: #e65100;
      }
      .result-section-title {
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }
      .result-content {
        font-size: 0.92rem;
        line-height: 1.85;
        white-space: pre-wrap;
      }

      /* error */
      .error-msg {
        background: var(--red-light);
        border-left: 3px solid var(--red);
        padding: 1rem 1.2rem;
        border-radius: 0 4px 4px 0;
        font-size: 0.85rem;
        color: var(--red);
        display: none;
        margin-top: 1rem;
      }
      .error-msg.visible {
        display: block;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--rule);
        margin: 2rem 0;
      }
      .footer {
        text-align: center;
        font-size: 0.72rem;
        color: var(--ink-faint);
        letter-spacing: 0.05em;
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--rule);
      }

      @media (max-width: 520px) {
        .page {
          padding: 2rem 1.2rem 4rem;
        }
        .exam-row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <p class="masthead-label">Deutsches Schreiben</p>
        <h1>Schreib<em>trainer</em> C1</h1>
        <p class="masthead-sub">괴테 · TELC C1 글쓰기 첨삭 도우미</p>
      </header>

      <div>
        <p class="section-label">시험 유형</p>
        <div class="exam-row">
          <button
            class="exam-btn active"
            data-exam="goethe"
            onclick="selectExam(this)"
          >
            Goethe C1<span class="exam-sub">Goethe-Zertifikat</span>
          </button>
          <button class="exam-btn" data-exam="telc" onclick="selectExam(this)">
            TELC C1<span class="exam-sub">telc Deutsch</span>
          </button>
        </div>
      </div>

      <div class="topic-area">
        <p class="section-label">오늘의 주제</p>
        <div class="topic-box" id="topic-box">
          <span class="topic-placeholder"
            >아래 버튼을 눌러 글쓰기 주제를 생성하세요.</span
          >
        </div>
        <div class="topic-actions">
          <button
            class="btn btn-primary"
            id="gen-btn"
            onclick="generateTopic()"
          >
            주제 생성
          </button>
          <button
            class="btn btn-ghost"
            id="regen-btn"
            onclick="generateTopic()"
            style="display: none"
          >
            ↺ 다른 주제
          </button>
          <div class="loading" id="topic-loading">
            AI가 주제를 구성하는 중<span class="dots"
              ><span>.</span><span>.</span><span>.</span></span
            >
          </div>
        </div>
      </div>

      <hr class="divider" />

      <div class="writing-area">
        <p class="section-label">글쓰기</p>
        <div class="writing-meta">
          <span></span>
          <span class="word-count" id="word-count">0 단어</span>
        </div>
        <textarea
          id="essay"
          placeholder="여기에 독일어로 글을 작성하세요. C1 수준의 어휘와 문법을 사용해 보세요."
          oninput="updateWordCount()"
        ></textarea>
        <div class="submit-row">
          <button
            class="btn btn-primary"
            id="submit-btn"
            onclick="submitEssay()"
          >
            첨삭 받기
          </button>
          <span class="warn-msg" id="warn-msg"
            >최소 50단어 이상 작성해 주세요.</span
          >
        </div>
      </div>

      <div class="loading" id="essay-loading">
        첨삭 중<span class="dots"
          ><span>.</span><span>.</span><span>.</span></span
        >
      </div>
      <div class="error-msg" id="error-msg"></div>

      <div class="result" id="result">
        <p class="result-title">첨삭 결과</p>
        <div class="result-section">
          <div class="result-section-header">
            <span class="result-section-icon icon-correction">✎</span>
            <span class="result-section-title"
              >수정 예시 — Korrekturbeispiele</span
            >
          </div>
          <div class="result-content" id="result-correction"></div>
        </div>
        <div class="result-section">
          <div class="result-section-header">
            <span class="result-section-icon icon-good">✓</span>
            <span class="result-section-title">잘한 점 — Stärken</span>
          </div>
          <div class="result-content" id="result-good"></div>
        </div>
        <div class="result-section">
          <div class="result-section-header">
            <span class="result-section-icon icon-improve">→</span>
            <span class="result-section-title"
              >개선점 — Verbesserungsvorschläge</span
            >
          </div>
          <div class="result-content" id="result-improve"></div>
        </div>
      </div>

      <footer class="footer">Schreibtrainer C1 · Powered by Groq API</footer>
    </div>

    <script>
      // ── API 키 — Groq 전용 키 입력 ──
      const GROQ_API_KEY =
        " ";

      // ── 상태 ──
      let examType = "goethe";
      let currentTopic = "";

      // ── 시험 유형 선택 ──
      function selectExam(btn) {
        document
          .querySelectorAll(".exam-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        examType = btn.dataset.exam;
      }

      // ── 단어 수 ──
      function countWords(text) {
        return text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
      }
      function updateWordCount() {
        const n = countWords(document.getElementById("essay").value);
        const el = document.getElementById("word-count");
        el.textContent = n + " 단어";
        el.classList.toggle("warn", n > 0 && n < 50);
      }

      // ── Groq API 호출 함수 ──
      async function callGroq(prompt) {
        const res = await fetch(
          "https://api.groq.com/openai/v1/chat/completions",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${GROQ_API_KEY}`,
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile", // 한국어 번역 및 독일어 C1 이해도가 높은 최신 고성능 모델
              messages: [{ role: "user", content: prompt }],
              temperature: 0.7,
              max_tokens: 2048,
            }),
          },
        );
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(
            err?.error?.message || `Groq API 오류 (${res.status})`,
          );
        }
        const data = await res.json();
        return data.choices?.[0]?.message?.content ?? "";
      }

      // ── 주제 생성 ──
      async function generateTopic() {
        setTopicLoading(true);
        hideError();
        try {
          const examName =
            examType === "goethe" ? "Goethe-Zertifikat C1" : "TELC Deutsch C1";
          const prompt = `Du bist ein Prüfungsexperte für ${examName}.
Erstelle ein realistisches Thema für den Prüfungsteil „Schreiben“ der telc Deutsch C1 Prüfung.
Die Aufgabe soll aus:
- einer kurzen Einleitung mit Kontext,
- einem Zitat oder einer Statistik als Impuls,
- einer konkreten Schreibaufgabe,
- drei Leitfragen
bestehen.
Das Thema soll einem aktuellen gesellschaftlichen, wirtschaftlichen, technologischen, bildungsbezogenen, ökologischen oder kulturellen Diskussionsfeld entstammen und eine kontroverse Fragestellung enthalten, die sowohl Vor- als auch Nachteile zulässt.
Die Aufgabe muss die Kandidaten dazu auffordern, eine strukturierte Stellungnahme von mindestens 350 Wörtern zu verfassen, Argumente abzuwägen, Beispiele einzubeziehen und eine begründete persönliche Meinung zu vertreten.
Formatiere die Ausgabe ausschließlich wie eine authentische telc-C1-Schreibaufgabe auf Deutsch. Gib keine Lösung, keine Gliederung und keine zusätzlichen Erklärungen aus.`;

          // 여기서 기존 callGemini 대신 callGroq 호출
          const topic = await callGroq(prompt);
          currentTopic = topic.trim();
          const box = document.getElementById("topic-box");
          box.innerHTML = "";
          box.textContent = currentTopic;
          document.getElementById("regen-btn").style.display = "inline-flex";
        } catch (e) {
          showError(e.message);
        } finally {
          setTopicLoading(false);
        }
      }

      function setTopicLoading(on) {
        document
          .getElementById("topic-loading")
          .classList.toggle("visible", on);
        document.getElementById("gen-btn").disabled = on;
        document.getElementById("regen-btn").disabled = on;
      }

      // ── 첨삭 제출 ──
      async function submitEssay() {
        const essay = document.getElementById("essay").value.trim();
        document.getElementById("warn-msg").classList.remove("visible");
        if (countWords(essay) < 50) {
          document.getElementById("warn-msg").classList.add("visible");
          return;
        }
        if (!currentTopic) {
          showError("먼저 주제를 생성해 주세요.");
          return;
        }

        setEssayLoading(true);
        hideError();
        hideResult();

        try {
          const examName =
            examType === "goethe" ? "Goethe-Zertifikat C1" : "TELC Deutsch C1";
          const prompt = `Du bist ein erfahrener Prüfer für ${examName}.
Analysiere den folgenden deutschen Aufsatz eines Lernenden auf C1-Niveau.

AUFGABE:
${currentTopic}

AUFSATZ DES LERNENDEN:
${essay}

Antworte AUSSCHLIESSLICH in folgendem Format (Abschnittsüberschriften GENAU so):

[KORREKTURBEISPIELE]
Zeige 3–5 konkrete Sätze mit Fehlern. Format:
❌ (Originalsatz)
✅ (Korrigierter Satz)
(Kurze Erklärung auf Koreanisch)

[STÄRKEN]
3–4 konkrete Stärken auf Koreanisch, mit Bezug auf spezifische Formulierungen aus dem Text.

[VERBESSERUNGSVORSCHLÄGE]
3–4 konkrete Verbesserungsvorschläge auf Koreanisch, mit Begründung aus C1-Perspektive.`;

          // 여기서 기존 callGemini 대신 callGroq 호출
          const raw = await callGroq(prompt);
          parseAndShowResult(raw);
        } catch (e) {
          showError(e.message);
        } finally {
          setEssayLoading(false);
        }
      }

      function setEssayLoading(on) {
        document
          .getElementById("essay-loading")
          .classList.toggle("visible", on);
        document.getElementById("submit-btn").disabled = on;
      }

      // ── 결과 파싱 ──
      function parseAndShowResult(raw) {
        const get = (tag) => {
          const re = new RegExp(`\\[${tag}\\]([\\s\\S]*?)(?=\\[|$)`, "i");
          const m = raw.match(re);
          return m ? m[1].trim() : "";
        };
        document.getElementById("result-correction").textContent =
          get("KORREKTURBEISPIELE");
        document.getElementById("result-good").textContent = get("STÄRKEN");
        document.getElementById("result-improve").textContent = get(
          "VERBESSERUNGSVORSCHLÄGE",
        );
        document.getElementById("result").classList.add("visible");
        document
          .getElementById("result")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function hideResult() {
        document.getElementById("result").classList.remove("visible");
      }
      function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = "오류: " + msg;
        el.classList.add("visible");
      }
      function hideError() {
        document.getElementById("error-msg").classList.remove("visible");
      }
    </script>
  </body>
</html>
